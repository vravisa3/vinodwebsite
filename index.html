<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:#ffffff;
color:#111111;
overflow-x:hidden;
}

:root{
--orange:#f97316;
--light-orange:#fff7ed;
--text:#111111;
--muted:#666666;
--border:#e5e7eb;
--card:#ffffff;
}

.container{
width:90%;
max-width:1250px;
margin:auto;
}

/* NAVBAR */

header{
position:fixed;
width:100%;
top:0;
z-index:1000;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 0;
}

.logo{
font-size:1.5rem;
font-weight:800;
color:var(--orange);
}

nav ul{
display:flex;
gap:34px;
list-style:none;
}

nav ul li a{
text-decoration:none;
color:#111111;
font-size:0.95rem;
font-weight:500;
transition:0.3s;
}

nav ul li a:hover{
color:var(--orange);
}

.nav-btn{
background:var(--orange);
color:white;
padding:14px 24px;
border-radius:50px;
text-decoration:none;
font-weight:600;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
align-items:center;
padding-top:100px;
}

.hero-grid{
display:grid;
grid-template-columns:1.1fr 0.9fr;
gap:70px;
align-items:center;
}

.hero-tag{
display:inline-block;
padding:10px 18px;
border-radius:50px;
background:var(--light-orange);
color:var(--orange);
font-size:0.85rem;
font-weight:600;
margin-bottom:28px;
}

.hero h1{
font-size:5rem;
line-height:1;
font-weight:800;
margin-bottom:24px;
}

.hero h1 span{
color:var(--orange);
}

.hero p{
font-size:1.1rem;
line-height:1.9;
color:var(--muted);
max-width:650px;
}

.hero-buttons{
display:flex;
gap:18px;
margin-top:40px;
}

.btn-primary{
background:var(--orange);
color:white;
padding:16px 30px;
border-radius:50px;
text-decoration:none;
font-weight:600;
}

.btn-secondary{
border:1px solid var(--border);
padding:16px 30px;
border-radius:50px;
text-decoration:none;
color:#111111;
font-weight:600;
background:white;
}

.hero-image img{
width:100%;
border-radius:24px;
}

/* GENERAL */

section{
padding:110px 0;
}

.section-title{
font-size:3.5rem;
font-weight:800;
margin-bottom:20px;
}

.section-title span{
color:var(--orange);
}

.section-subtitle{
color:var(--muted);
max-width:750px;
line-height:1.9;
margin-bottom:70px;
}

/* ABOUT */

.about-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:24px;
}

.about-card{
background:white;
padding:40px;
border-radius:22px;
border:1px solid var(--border);
transition:0.3s;
}

.about-card:hover{
transform:translateY(-5px);
}

.about-card h3{
margin-bottom:18px;
font-size:1.4rem;
color:var(--orange);
}

.about-card p{
line-height:1.8;
color:var(--muted);
}

/* EXPERIENCE */

.timeline{
border-left:2px solid #fed7aa;
padding-left:40px;
}

.timeline-item{
margin-bottom:50px;
position:relative;
}

.timeline-dot{
position:absolute;
left:-50px;
top:5px;
width:18px;
height:18px;
border-radius:50%;
background:var(--orange);
}

.timeline-content{
padding:32px;
border:1px solid var(--border);
border-radius:22px;
background:white;
}

.timeline-content h3{
font-size:1.5rem;
margin-bottom:10px;
}

.timeline-content h4{
color:var(--orange);
margin-bottom:16px;
}

.timeline-content p{
color:var(--muted);
line-height:1.8;
}

/* PROJECTS */

.project{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
align-items:center;
margin-bottom:120px;
}

.project:nth-child(even){
direction:rtl;
}

.project:nth-child(even) .project-content{
direction:ltr;
}

.project-image img{
width:100%;
border-radius:24px;
}

.project-content span{
font-size:0.85rem;
text-transform:uppercase;
letter-spacing:1px;
color:var(--orange);
font-weight:600;
}

.project-content h3{
font-size:2.8rem;
margin:18px 0;
line-height:1.1;
}

.project-content p{
color:var(--muted);
line-height:1.9;
margin-bottom:24px;
}

.tools{
display:flex;
flex-wrap:wrap;
gap:12px;
}

.tools div{
padding:10px 16px;
border-radius:50px;
background:var(--light-orange);
font-size:0.85rem;
color:var(--orange);
font-weight:500;
}

/* SKILLS */

.skills-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:24px;
}

.skill-box{
padding:36px;
border-radius:22px;
border:1px solid var(--border);
}

.skill-box h3{
margin-bottom:24px;
font-size:1.5rem;
color:var(--orange);
}

.skill-box ul{
list-style:none;
}

.skill-box ul li{
margin-bottom:14px;
color:var(--muted);
}

/* BLOGS */

.blog-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:24px;
}

.blog-card{
padding:34px;
border-radius:22px;
border:1px solid var(--border);
text-decoration:none;
transition:0.3s;
background:white;
}

.blog-card:hover{
transform:translateY(-5px);
}

.blog-card h3{
color:#111111;
margin-bottom:18px;
font-size:1.4rem;
}

.blog-card p{
color:var(--muted);
line-height:1.8;
}

/* FOOTER */

footer{
padding:120px 0 80px;
text-align:center;
border-top:1px solid var(--border);
}

footer h2{
font-size:3.5rem;
margin-bottom:24px;
}

footer p{
color:var(--muted);
max-width:700px;
margin:auto;
line-height:1.9;
margin-bottom:40px;
}

.footer-links{
display:flex;
justify-content:center;
gap:24px;
flex-wrap:wrap;
}

.footer-links a{
text-decoration:none;
color:var(--orange);
font-weight:600;
}

/* RESPONSIVE */

@media(max-width:1000px){

.hero-grid,
.project,
.about-grid,
.skills-grid,
.blog-grid{
grid-template-columns:1fr;
}

.hero h1{
font-size:3.8rem;
}

.section-title{
font-size:2.8rem;
}

.project:nth-child(even){
direction:ltr;
}

nav ul{
display:none;
}

}

@media(max-width:600px){

.hero h1{
font-size:3rem;
}

.section-title{
font-size:2.3rem;
}

.hero-buttons{
flex-direction:column;
}

.btn-primary,
.btn-secondary{
text-align:center;
}

}

</style>
